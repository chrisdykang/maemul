<!DOCTYPE html>

<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매물장</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e5e3de;
    --border-strong: #c9c7c0;
    --text: #1a1a18;
    --text-2: #6b6960;
    --text-3: #a09d94;
    --accent: #1a1a18;
    --accent-fg: #ffffff;
    --green: #2d6a4f;
    --green-bg: #e8f5ee;
    --amber: #92400e;
    --amber-bg: #fef3c7;
    --blue: #1e40af;
    --blue-bg: #eff6ff;
    --red: #991b1b;
    --red-bg: #fef2f2;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
  .nav { display: flex; gap: 2px; }
  .nav-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: none; background: none; cursor: pointer; font-size: 13px; color: var(--text-2); font-family: inherit; transition: all 0.15s; }
  .nav-btn.active { background: var(--accent); color: var(--accent-fg); }
  .nav-btn:hover:not(.active) { background: var(--bg); color: var(--text); }
  .api-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: none; cursor: pointer; font-size: 12px; color: var(--text-2); font-family: inherit; transition: all 0.15s; }
  .api-btn:hover { background: var(--bg); }
  .main { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* Settings Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 480px; max-width: 90vw; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* Form */
  .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .form-section-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .form-section-head h2 { font-size: 14px; font-weight: 600; }
  .form-body { padding: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .form-full { grid-column: 1 / -1; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .fg input, .fg select, .fg textarea {
    padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; background: var(--bg); color: var(--text);
    transition: border-color 0.15s; outline: none;
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); background: var(--surface); }
  .fg textarea { resize: vertical; min-height: 72px; line-height: 1.6; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .checkbox-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  .checkbox-row label { font-size: 13px; color: var(--text); cursor: pointer; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

  /* Buttons */
  .btn { padding: 8px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border-strong); }
  .btn-secondary:hover { background: var(--border); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-2); }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }

  /* Form actions */
  .form-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg); }

  /* Listings */
  .listings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .listings-header h2 { font-size: 16px; font-weight: 600; }
  .filter-row { display: flex; gap: 8px; align-items: center; }
  .filter-row select, .filter-row input { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; }
  .listing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.15s; }
  .listing-card:hover { border-color: var(--border-strong); }
  .listing-card-head { padding: 14px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .listing-card-head-info { flex: 1; min-width: 0; }
  .listing-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .listing-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .listing-card-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .listing-price { font-size: 15px; font-weight: 700; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .badge-apt { background: var(--blue-bg); color: var(--blue); }
  .badge-off { background: var(--green-bg); color: var(--green); }
  .badge-com { background: var(--amber-bg); color: var(--amber); }
  .badge-etc { background: var(--bg); color: var(--text-2); border: 1px solid var(--border); }
  .badge-active { background: var(--green-bg); color: var(--green); }
  .badge-received { background: var(--blue-bg); color: var(--blue); }
  .badge-closed { background: var(--bg); color: var(--text-3); }
  .badge-cancelled { background: var(--red-bg); color: var(--red); }
  .listing-card-body { border-top: 1px solid var(--border); padding: 16px 18px; display: none; }
  .listing-card-body.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .detail-item { display: flex; flex-direction: column; gap: 3px; }
  .detail-label { font-size: 11px; color: var(--text-3); font-weight: 500; }
  .detail-value { font-size: 13px; color: var(--text); font-weight: 500; }
  .ad-copy-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; line-height: 1.75; white-space: pre-wrap; color: var(--text); }
  .ad-section { margin-top: 12px; }
  .ad-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ad-label { font-size: 12px; font-weight: 600; color: var(--text-2); }
  .copy-btn { padding: 4px 10px; font-size: 11px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); cursor: pointer; font-family: inherit; color: var(--text-2); transition: all 0.15s; }
  .copy-btn:hover { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .update-panel { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
  .update-panel-head { margin-bottom: 12px; }
  .update-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .update-memo { grid-column: 1 / -1; }
  .update-memo textarea { width: 100%; font-size: 13px; padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; background: var(--bg); color: var(--text); resize: vertical; min-height: 56px; outline: none; }
  .update-memo textarea:focus { border-color: var(--accent); background: var(--surface); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
  .empty-state p { font-size: 14px; margin-top: 8px; }
  .loading { text-align: center; padding: 40px; color: var(--text-3); font-size: 13px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: var(--accent-fg); padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .no-api { background: var(--amber-bg); border: 1px solid #fcd34d; border-radius: var(--radius); padding: 14px 18px; font-size: 13px; color: var(--amber); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text-3); font-weight: 500; margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 700; }

  /* Responsive */
  @media (max-width: 640px) {
    .main { padding: 16px; }
    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .header { padding: 0 16px; }
    .nav-btn span { display: none; }
    .listing-card-meta { flex-direction: column; align-items: flex-end; gap: 4px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">매물장</div>
      <nav class="nav">
        <button class="nav-btn active" onclick="showPage(&#39;listings&#39;)" id="nav-listings">매물 목록</button>
        <button class="nav-btn" onclick="showPage(&#39;add&#39;)" id="nav-add">+ 매물 등록</button>
      </nav>
    </div>
    <button class="api-btn" onclick="openSettings()">API 설정</button>
  </header>

  <main class="main">
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
      <div class="modal">
        <h2>Airtable API 설정</h2>
        <div class="fg" style="margin-bottom:12px">
          <label>Personal Access Token</label>
          <input type="password" id="s-token" placeholder="pat...">
        </div>
        <div class="fg" style="margin-bottom:12px">
          <label>Base ID</label>
          <input type="text" id="s-base" placeholder="app...">
        </div>
        <div style="font-size:12px;color:var(--text-3);line-height:1.6">
          Base ID는 Airtable에서 부동산 매물장 Base를 열고<br>
          주소창 URL에서 <strong>app으로 시작하는 부분</strong>이에요.<br>
          예: airtable.com/<strong>appXXXXXXXXXXXXXX</strong>/...
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeSettings()">취소</button>
          <button class="btn btn-primary" onclick="saveSettings()">저장</button>
        </div>
      </div>
    </div>

    <!-- Listings Page -->
    <div id="page-listings">
      <div id="no-api-banner" class="no-api" style="display:none">
        API 설정이 필요해요. Airtable Token과 Base ID를 입력해 주세요.
        <button class="btn btn-sm btn-secondary" onclick="openSettings()">설정하기</button>
      </div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-label">전체</div><div class="stat-val" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-label">광고중</div><div class="stat-val" id="stat-active">—</div></div>
        <div class="stat-card"><div class="stat-label">계약완료</div><div class="stat-val" id="stat-closed">—</div></div>
        <div class="stat-card"><div class="stat-label">접수중</div><div class="stat-val" id="stat-received">—</div></div>
      </div>
      <div class="listings-header">
        <h2 id="listings-count">매물 목록</h2>
        <div class="filter-row">
          <select id="filter-type" onchange="applyFilter()">
            <option value="">전체 유형</option>
            <option value="아파트">아파트</option>
            <option value="오피스텔">오피스텔</option>
            <option value="상가">상가</option>
            <option value="사무실">사무실</option>
            <option value="빌라">빌라</option>
            <option value="단독주택">단독주택</option>
          </select>
          <select id="filter-status" onchange="applyFilter()">
            <option value="">진행중 (기본)</option>
            <option value="all">전체 보기</option>
            <option value="광고중">광고중</option>
            <option value="접수중">접수중</option>
            <option value="계약완료">계약완료</option>
            <option value="취소(타부동산계약)">취소(타부동산계약)</option>
          </select>
          <button class="btn btn-sm btn-ghost" onclick="loadListings()">새로고침</button>
        </div>
      </div>
      <div id="listings-container"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- Add Page -->
    <div id="page-add" style="display:none">
      <div class="form-section">
        <div class="form-section-head">
          <h2>매물 등록</h2>
        </div>
        <div class="form-body">
          <div class="section-label">기본 정보</div>
          <div class="form-grid">
            <div class="fg">
              <label>매물 유형 *</label>
              <select id="f-type">
                <option value="아파트">아파트</option>
                <option value="오피스텔">오피스텔</option>
                <option value="상가">상가</option>
                <option value="사무실">사무실</option>
                <option value="단독주택">단독주택</option>
                <option value="빌라">빌라</option>
              </select>
            </div>
            <div class="fg">
              <label>거래 방식 *</label>
              <select id="f-deal">
                <option value="매매">매매</option>
                <option value="전세">전세</option>
                <option value="월세">월세</option>
              </select>
            </div>
            <div class="fg">
              <label>단지·건물명 *</label>
              <input type="text" id="f-name" placeholder="예: 래미안 역삼">
            </div>
            <div class="fg">
              <label>행정동 *</label>
              <input type="text" id="f-district" placeholder="예: 역삼1동">
            </div>
            <div class="fg">
              <label>동호수</label>
              <input type="text" id="f-unit" placeholder="예: 101동 1502호">
            </div>
            <div class="fg">
              <label>방향</label>
              <select id="f-facing">
                <option value="">선택</option>
                <option value="남">남향</option>
                <option value="남동">남동향</option>
                <option value="남서">남서향</option>
                <option value="동">동향</option>
                <option value="서">서향</option>
                <option value="북">북향</option>
                <option value="북동">북동향</option>
                <option value="북서">북서향</option>
              </select>
            </div>
          </div>

          <div class="divider"></div>
          <div class="section-label">면적 · 구조</div>
          <div class="form-grid-3">
            <div class="fg">
              <label>면적 (㎡)</label>
              <input type="number" id="f-area" placeholder="84">
            </div>
            <div class="fg">
              <label>층수</label>
              <input type="number" id="f-floor" placeholder="15">
            </div>
            <div class="fg">
              <label>전체 층수</label>
              <input type="number" id="f-total-floors" placeholder="25">
            </div>
            <div class="fg">
              <label>방 수</label>
              <input type="number" id="f-rooms" placeholder="3">
            </div>
            <div class="fg">
              <label>욕실 수</label>
              <input type="number" id="f-baths" placeholder="2">
            </div>
            <div class="fg">
              <label>주차 대수</label>
              <input type="number" id="f-parking-n" placeholder="1">
            </div>
          </div>
          <div style="display:flex;gap:20px;margin-top:10px">
            <div class="checkbox-row">
              <input type="checkbox" id="f-parking" checked="">
              <label for="f-parking">주차 가능</label>
            </div>
            <div class="checkbox-row">
              <input type="checkbox" id="f-elevator" checked="">
              <label for="f-elevator">엘리베이터</label>
            </div>
          </div>

          <div class="divider"></div>
          <div class="section-label">가격</div>
          <div class="form-grid-3">
            <div class="fg">
              <label>매매가·보증금 (만원) *</label>
              <input type="number" id="f-price" placeholder="125000">
            </div>
            <div class="fg">
              <label>월세 (만원)</label>
              <input type="number" id="f-monthly" placeholder="월세일 때">
            </div>
            <div class="fg">
              <label>관리비 (만원)</label>
              <input type="number" id="f-maint" placeholder="15">
            </div>
          </div>

          <div class="divider"></div>
          <div class="section-label">광고 정보</div>
          <div class="form-grid">
            <div class="fg">
              <label>입주 가능일</label>
              <input type="text" id="f-avail" placeholder="예: 즉시입주, 2025년 6월">
            </div>
            <div class="fg">
              <label>매물 상태</label>
              <select id="f-status">
                <option value="접수중">접수중</option>
                <option value="광고중">광고중</option>
                <option value="계약완료">계약완료</option>
                <option value="취소(타부동산계약)">취소(타부동산계약)</option>
              </select>
            </div>
            <div class="fg form-full">
              <label>셀링포인트 * (광고 문구 생성에 활용)</label>
              <textarea id="f-selling" placeholder="예: 한강뷰, 풀옵션, 리모델링 완료, 강남역 도보 10분, 초등학교 도보 3분"></textarea>
            </div>
            <div class="fg form-full">
              <label>내부 메모 (광고에 미포함)</label>
              <textarea id="f-memo" placeholder="열쇠 위치, 집주인 요청사항 등"></textarea>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="resetForm()">초기화</button>
          <button class="btn btn-primary" id="submit-btn" onclick="submitListing()">Airtable에 저장</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let TOKEN = localStorage.getItem('at_token') || '';
let BASE_ID = localStorage.getItem('at_base') || '';
let TABLE = 'Listings';
let allListings = [];

function openSettings() {
  document.getElementById('s-token').value = TOKEN;
  document.getElementById('s-base').value = BASE_ID;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}
function saveSettings() {
  TOKEN = document.getElementById('s-token').value.trim();
  BASE_ID = document.getElementById('s-base').value.trim();
  localStorage.setItem('at_token', TOKEN);
  localStorage.setItem('at_base', BASE_ID);
  closeSettings();
  showToast('API 설정이 저장됐어요');
  loadListings();
}

function showPage(page) {
  document.getElementById('page-listings').style.display = page === 'listings' ? '' : 'none';
  document.getElementById('page-add').style.display = page === 'add' ? '' : 'none';
  document.getElementById('nav-listings').classList.toggle('active', page === 'listings');
  document.getElementById('nav-add').classList.toggle('active', page === 'add');
  if(page === 'listings') loadListings();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function airtableFetch(path, options = {}) {
  const [pathPart, queryPart] = path.split('?');
  const encodedPath = pathPart.split('/').map(encodeURIComponent).join('/');
  const fullPath = queryPart ? `${encodedPath}?${queryPart}` : encodedPath;
  const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${fullPath}`, {
    ...options,
    headers: {
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const errBody = await res.text();
    throw new Error(`Airtable 오류: ${res.status} — ${errBody}`);
  }
  return res.json();
}

async function loadListings() {
  if (!TOKEN || !BASE_ID) {
    document.getElementById('no-api-banner').style.display = 'flex';
    document.getElementById('listings-container').innerHTML = '';
    return;
  }
  document.getElementById('no-api-banner').style.display = 'none';
  document.getElementById('listings-container').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const data = await airtableFetch(`${TABLE}?sort%5B0%5D%5Bfield%5D=listing_id&sort%5B0%5D%5Bdirection%5D=desc`);
    allListings = data.records || [];
    updateStats();
    applyFilter();
  } catch(e) {
    document.getElementById('listings-container').innerHTML = `<div class="empty-state"><p>불러오기 실패: ${e.message}</p><p style="margin-top:8px">API 설정을 확인해 주세요.</p></div>`;
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allListings.length;
  document.getElementById('stat-active').textContent = allListings.filter(r => r.fields.status === '광고중').length;
  document.getElementById('stat-closed').textContent = allListings.filter(r => r.fields.status === '계약완료').length;
  document.getElementById('stat-received').textContent = allListings.filter(r => r.fields.status === '접수중').length;
}

function applyFilter() {
  const type = document.getElementById('filter-type').value;
  const status = document.getElementById('filter-status').value;
  let filtered = allListings;
  if(type) filtered = filtered.filter(r => r.fields.property_type === type);
  if(status === 'all') {
    // 전체 보기
  } else if(status) {
    filtered = filtered.filter(r => r.fields.status === status);
  } else {
    // 기본: 계약완료·취소 숨김
    filtered = filtered.filter(r => r.fields.status !== '계약완료' && r.fields.status !== '취소(타부동산계약)');
  }
  renderListings(filtered);
}

function typeBadge(t) {
  const map = { '아파트': 'badge-apt', '오피스텔': 'badge-off', '상가': 'badge-com', '사무실': 'badge-com', '빌라': 'badge-etc', '단독주택': 'badge-etc' };
  const cls = map[t] || 'badge-etc';
  return `<span class="badge ${cls}">${t||'—'}</span>`;
}
function dealLabel(d) { return d || '—'; }
function dirLabel(d) {
  const map = { '남':'남향','남동':'남동향','남서':'남서향','동':'동향','서':'서향','북':'북향','북동':'북동향','북서':'북서향' };
  return map[d] || d || '';
}
  const map = { '광고중': ['광고중','badge-active'], '접수중': ['접수중','badge-received'], '계약완료': ['계약완료','badge-closed'], '취소(타부동산계약)': ['취소','badge-cancelled'] };
  const [label, cls] = map[s] || [s, 'badge-etc'];
  return `<span class="badge ${cls}">${label}</span>`;
}
function dealLabel(d) { return {Sale:'매매',Lease:'전세','Monthly Rent':'월세'}[d] || d; }
function dirLabel(d) { return {South:'남향',Southeast:'남동향',Southwest:'남서향',East:'동향',West:'서향',North:'북향'}[d] || d; }
function formatPrice(f) {
  const p = f.price_10k_krw;
  const m = f.monthly_rent_10k_krw;
  if(!p) return '—';
  const main = p >= 10000 ? `${(p/10000).toFixed(1)}억` : `${p.toLocaleString()}만`;
  return m ? `${main} / 월 ${m}만` : main;
}

function renderListings(records) {
  document.getElementById('listings-count').textContent = `매물 목록 (${records.length}건)`;
  if(records.length === 0) {
    document.getElementById('listings-container').innerHTML = '<div class="empty-state"><p>매물이 없어요.</p><p>매물 등록 탭에서 추가해 주세요.</p></div>';
    return;
  }
  const html = records.map(r => {
    const f = r.fields;
    const pyeong = f.area_sqm ? (f.area_sqm * 0.3025).toFixed(1) : '';
    return `<div class="listing-card">
      <div class="listing-card-head" onclick="toggleCard('${r.id}')">
        <div class="listing-card-head-info">
          <div class="listing-name">${f.building_name || '—'}</div>
          <div class="listing-sub">${f.district || ''} ${f.unit_number ? '· '+f.unit_number : ''} ${f.area_sqm ? '· '+f.area_sqm+'㎡('+pyeong+'평)' : ''} ${f.floor ? '· '+f.floor+'층' : ''}</div>
        </div>
        <div class="listing-card-meta">
          <div class="listing-price">${dealLabel(f.transaction_type)} ${formatPrice(f)}</div>
          ${typeBadge(f.property_type)}
          ${statusBadge(f.status)}
        </div>
      </div>
      <div class="listing-card-body" id="body-${r.id}">
        <div class="detail-grid">
          ${f.facing_direction ? `<div class="detail-item"><div class="detail-label">방향</div><div class="detail-value">${dirLabel(f.facing_direction)}</div></div>` : ''}
          ${f.rooms ? `<div class="detail-item"><div class="detail-label">방/욕실</div><div class="detail-value">${f.rooms}방 ${f.bathrooms || ''}욕실</div></div>` : ''}
          ${f.parking !== undefined ? `<div class="detail-item"><div class="detail-label">주차</div><div class="detail-value">${f.parking ? (f.parking_spaces ? f.parking_spaces+'대' : '가능') : '불가'}</div></div>` : ''}
          ${f.elevator !== undefined ? `<div class="detail-item"><div class="detail-label">엘리베이터</div><div class="detail-value">${f.elevator ? '있음' : '없음'}</div></div>` : ''}
          ${f.maintenance_fee_10k_krw ? `<div class="detail-item"><div class="detail-label">관리비</div><div class="detail-value">${f.maintenance_fee_10k_krw}만원</div></div>` : ''}
          ${f.available_date ? `<div class="detail-item"><div class="detail-label">입주가능일</div><div class="detail-value">${f.available_date}</div></div>` : ''}
        </div>
        ${f.selling_points ? `<div class="detail-item" style="margin-bottom:12px"><div class="detail-label" style="margin-bottom:4px">셀링포인트</div><div class="detail-value" style="font-weight:400;color:var(--text-2)">${f.selling_points}</div></div>` : ''}
        ${f.ad_copy_naver ? `<div class="ad-section"><div class="ad-section-head"><span class="ad-label">네이버 부동산 광고 문구</span><button class="copy-btn" onclick="copyAd('${r.id}','naver')">복사</button></div><div class="ad-copy-box" id="naver-${r.id}">${escHtml(f.ad_copy_naver)}</div></div>` : '<div style="font-size:12px;color:var(--text-3);padding:8px 0">광고 문구 생성 중... (Make 자동화가 실행되면 채워져요)</div>'}
        ${f.ad_copy_instagram ? `<div class="ad-section"><div class="ad-section-head"><span class="ad-label">인스타그램 광고 문구</span><button class="copy-btn" onclick="copyAd('${r.id}','insta')">복사</button></div><div class="ad-copy-box" id="insta-${r.id}">${escHtml(f.ad_copy_instagram)}</div></div>` : ''}
        ${f.internal_memo ? `<div class="ad-section"><div class="ad-label" style="margin-bottom:6px">내부 메모</div><div style="font-size:13px;color:var(--text-2)">${escHtml(f.internal_memo)}</div></div>` : ''}
        <div class="update-panel" id="update-${r.id}">
          <div class="update-panel-head">
            <span class="ad-label">거래 상태 수정</span>
          </div>
          <div class="update-grid">
            <div class="fg">
              <label>매물 상태</label>
              <select id="us-status-${r.id}">
                <option value="접수중" ${f.status==='접수중'?'selected':''}>접수중</option>
                <option value="광고중" ${f.status==='광고중'?'selected':''}>광고중</option>
                <option value="계약완료" ${f.status==='계약완료'?'selected':''}>계약완료</option>
                <option value="취소(타부동산계약)" ${f.status==='취소(타부동산계약)'?'selected':''}>취소(타부동산계약)</option>
              </select>
            </div>
            <div class="fg">
              <label>계약일</label>
              <input type="date" id="us-closed-${r.id}" value="${f.closed_date||''}">
            </div>
            <div class="fg">
              <label>계약 금액 (만원)</label>
              <input type="number" id="us-price-${r.id}" value="${f.price_10k_krw||''}" placeholder="${f.price_10k_krw||''}">
            </div>
            <div class="fg">
              <label>담당자</label>
              <input type="text" id="us-agent-${r.id}" value="${f.agent||''}" placeholder="담당자명">
            </div>
            <div class="fg update-memo">
              <label>메모 수정</label>
              <textarea id="us-memo-${r.id}" rows="2">${f.internal_memo||''}</textarea>
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:12px">
            <button class="btn btn-primary btn-sm" onclick="updateListing('${r.id}')">저장</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('listings-container').innerHTML = html;
}

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  body.classList.toggle('open');
}

function copyAd(id, type) {
  const el = document.getElementById(`${type === 'naver' ? 'naver' : 'insta'}-${id}`);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => showToast('복사됐어요!'));
}

async function updateListing(id) {
  const status = document.getElementById(`us-status-${id}`)?.value;
  const closedDate = document.getElementById(`us-closed-${id}`)?.value;
  const price = document.getElementById(`us-price-${id}`)?.value;
  const agent = document.getElementById(`us-agent-${id}`)?.value;
  const memo = document.getElementById(`us-memo-${id}`)?.value;

  const fields = {};
  if(status) fields.status = status;
  if(closedDate) fields.closed_date = closedDate;
  if(price) fields.price_10k_krw = parseInt(price);
  if(agent) fields.agent = agent;
  if(memo) fields.internal_memo = memo;

  if(Object.keys(fields).length === 0) { showToast('변경된 내용이 없어요.'); return; }

  try {
    await airtableFetch(`${TABLE}/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ fields })
    });
    showToast('저장됐어요!');

    // 계약완료·취소면 목록 새로고침 (카드 사라짐)
    // 그 외엔 카드 열린 상태 유지
    const shouldHide = status === '계약완료' || status === '취소(타부동산계약)';
    await loadListings();
    if(!shouldHide) {
      const body = document.getElementById('body-'+id);
      if(body) body.classList.add('open');
    }
  } catch(e) {
    alert(`저장 실패: ${e.message}`);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function resetForm() {
  ['f-name','f-district','f-unit','f-area','f-floor','f-total-floors','f-rooms','f-baths','f-parking-n','f-price','f-monthly','f-maint','f-avail','f-selling','f-memo'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('f-type').value = 'Apartment';
  document.getElementById('f-deal').value = 'Sale';
  document.getElementById('f-status').value = '접수중';
  document.getElementById('f-facing').value = '';
  document.getElementById('f-parking').checked = true;
  document.getElementById('f-elevator').checked = true;
}

async function submitListing() {
  if(!TOKEN || !BASE_ID) { openSettings(); return; }
  const name = document.getElementById('f-name').value.trim();
  const price = document.getElementById('f-price').value.trim();
  if(!name) { alert('단지·건물명을 입력해 주세요.'); return; }
  if(!price) { alert('가격을 입력해 주세요.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  const fields = {
    property_type: document.getElementById('f-type').value,
    transaction_type: document.getElementById('f-deal').value,
    building_name: name,
    district: document.getElementById('f-district').value,
    unit_number: document.getElementById('f-unit').value,
    area_sqm: parseFloat(document.getElementById('f-area').value) || null,
    floor: parseInt(document.getElementById('f-floor').value) || null,
    total_floors: parseInt(document.getElementById('f-total-floors').value) || null,
    rooms: parseInt(document.getElementById('f-rooms').value) || null,
    bathrooms: parseInt(document.getElementById('f-baths').value) || null,
    parking_spaces: parseInt(document.getElementById('f-parking-n').value) || null,
    price_10k_krw: parseInt(price) || null,
    monthly_rent_10k_krw: parseInt(document.getElementById('f-monthly').value) || null,
    maintenance_fee_10k_krw: parseInt(document.getElementById('f-maint').value) || null,
    available_date: document.getElementById('f-avail').value,
    facing_direction: document.getElementById('f-facing').value || null,
    selling_points: document.getElementById('f-selling').value,
    internal_memo: document.getElementById('f-memo').value,
    status: document.getElementById('f-status').value,
    parking: document.getElementById('f-parking').checked,
    elevator: document.getElementById('f-elevator').checked,
    received_date: new Date().toISOString().split('T')[0],
  };

  Object.keys(fields).forEach(k => { if(fields[k] === null || fields[k] === '') delete fields[k]; });

  try {
    await airtableFetch(TABLE, {
      method: 'POST',
      body: JSON.stringify({ fields })
    });
    showToast('저장됐어요! 광고 문구는 곧 자동 생성돼요.');
    resetForm();
    showPage('listings');
  } catch(e) {
    alert(`저장 실패: ${e.message}`);
  }

  btn.disabled = false;
  btn.textContent = 'Airtable에 저장';
}

// Init
if(!TOKEN || !BASE_ID) {
  setTimeout(openSettings, 500);
} else {
  loadListings();
}
</script>
